<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper:   '#FAFAF7',
          ink:     '#0A0A0A',
          ink2:    '#5C5C5C',
          ink3:    '#9A958B',
          rule:    '#EDEAE0',
          navy:    '#0A2540',
          'navy-2':'#0E2D4D',
          'navy-3':'#163960',
          cream:   '#F2EEDF',
          'cream-2':'#D9D2BD',
          coral:   '#E85C3C',
          'coral-2':'#C94A2D',
          ok:      '#2D7D6F',
          warn:    '#B8860B',
        },
        fontFamily: {
          display: ['"Fraunces"', 'serif'],
          sans:    ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],

<style>
  html, body { background: #FAFAF7; color: #0A0A0A; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  body { font-feature-settings: 'ss01', 'cv11'; -webkit-font-smoothing: antialiased; }

  /* Custom scrollbars — thin, editorial */
  .scroll-paper::-webkit-scrollbar { width: 10px; height: 10px; }
  .scroll-paper::-webkit-scrollbar-track { background: transparent; }
  .scroll-paper::-webkit-scrollbar-thumb { background: #EDEAE0; border-radius: 999px; border: 3px solid #FAFAF7; }
  .scroll-paper::-webkit-scrollbar-thumb:hover { background: #D9D2BD; }

  .scroll-navy::-webkit-scrollbar { width: 10px; }
  .scroll-navy::-webkit-scrollbar-track { background: rgba(0,0,0,.15); }
  .scroll-navy::-webkit-scrollbar-thumb { background: rgba(242,238,223,.28); border-radius: 999px; }
  .scroll-navy::-webkit-scrollbar-thumb:hover { background: rgba(242,238,223,.45); }

  /* Staggered entry */
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rise { animation: rise .55s cubic-bezier(.2,.7,.2,1) both; }

  @keyframes pulseDot {
    0%, 100% { opacity: 1; }
    50%      { opacity: .35; }
  }
  .pulse-dot { animation: pulseDot 1.6s ease-in-out infinite; }

  /* Caret blink for streaming text */
  @keyframes blink { 50% { opacity: 0; } }
  .caret { display: inline-block; width: 7px; height: 1em; transform: translateY(2px); background: #0A0A0A; margin-left: 2px; animation: blink 1s steps(2, end) infinite; }

  /* Subtle paper grain in the message column */
  .grain {
    background-image:
      radial-gradient(rgba(10,10,10,.025) 1px, transparent 1px),
      radial-gradient(rgba(10,10,10,.02) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }

  /* Mono small caps for labels */
  .mono-label { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; }

  /* Display kerning */
  .font-display { font-optical-sizing: auto; letter-spacing: -0.01em; }

  /* Focus ring */
  textarea:focus, input:focus, button:focus-visible { outline: none; }
  .focus-ring:focus-within { box-shadow: 0 0 0 1px #0A2540, 0 8px 24px -12px rgba(10,37,64,.25); }

  /* Hide scrollbar arrows in Firefox */
  * { scrollbar-width: thin; scrollbar-color: #EDEAE0 transparent; }
</style>
