name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit (high/critical only)
        run: npm audit --audit-level=high
        continue-on-error: false

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: producto-customer-ui:ci
          build-args: |
            VERSION=${{ github.sha }}

      - name: Smoke test image
        run: |
          docker run -d --name ci-ui -p 8080:8080 \
            -e BACKEND_URL_CENTRAL=http://central:8080 \
            -e AUTH_MODE=iam_interno \
            producto-customer-ui:ci
          sleep 3
          curl -fsS http://localhost:8080/healthz
          curl -fsS http://localhost:8080/config.js | head -5
          docker logs ci-ui
          docker rm -f ci-ui
