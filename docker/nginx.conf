server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # No cache para el shell HTML — siempre debe traer la última versión.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    try_files $uri =404;
  }

  # config.js también sin cache: cambia con cada arranque del contenedor.
  location = /config.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    types { } default_type application/javascript;
    try_files $uri =404;
  }

  # Health endpoint para HEALTHCHECK del Dockerfile.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Assets con hash: cache largo, immutable.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # SPA fallback: cualquier ruta no resuelta va a index.html.
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    try_files $uri $uri/ /index.html;
  }

  # Bloquear acceso a dotfiles.
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
